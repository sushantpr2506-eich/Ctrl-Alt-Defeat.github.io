    .ranking-showcase .rank-context {

    .season-stats-grid {

      border-radius: 10px;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .season-stat-card::before {

      top: 0;
      left: 0;
      width: 4px;
      height: 4px;
      background: var(--red);
